<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refynd Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, #f4f7fe 0%, #e4ecfa 100%);
            overflow: hidden;
            color: #1e293b;
        }

        /* --- COMPACT SIDEBAR --- */
        .sidebar {
            width: 240px; /* Reduced from 280px for a more compact look */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            padding: 20px 16px; /* Tighter padding */
            color: white;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), margin-left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 10px 0 30px rgba(15, 23, 42, 0.15);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .sidebar.hide {
            transform: translateX(-100%);
            margin-left: -240px; /* Adjusted to new width */
        }

        
        .logo {
            font-size: 26px; /* Reduced font size */
            font-weight: 800;
            margin-bottom: 25px; /* Tighter bottom margin */
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-left: 6px;
        }

        .menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Tighter compact gap */
            height: 100%;
        }

        /* Smaller Navigation Row Footprints */
        .menu li {
            padding: 10px 14px; /* Reduced padding */
            border-radius: 10px; /* Symmetrical edge smoothing */
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            font-weight: 500;
            font-size: 13.5px; /* Clean, highly readable downscaled text */
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.25s ease;
        }

        .menu li i {
            font-size: 15px; /* Smaller icon structure */
            width: 20px; /* Fixed width alignment footprint */
            text-align: center;
        }

        .menu li:hover {
            transform: translateX(4px);
            background: linear-gradient(90deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 6px 12px rgba(79, 70, 229, 0.25);
        }

        /* COMPACT FEATURES DROPDOWN */
        .dropdown {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start !important;
        }

        .dropdown-title {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .dropdown-title i:last-child {
            margin-left: auto;
            font-size: 10px;
            transition: transform 0.3s ease;
        }

        .dropdown-buttons {
            max-height: 0;
            overflow: hidden;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: max-height 0.3s ease, margin-top 0.2s ease;
        }

        .dropdown:hover .dropdown-buttons {
            max-height: 200px;
            margin-top: 8px;
        }

        .dropdown:hover .dropdown-title i:last-child {
            transform: rotate(180deg);
        }

        .feature-btn {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .feature-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        .match { background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%); }
        .message { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .claims { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }

        /* Push logout to bottom using clean alignment structure */
        .logout-item {
            margin-top: auto; 
            color: #f43f5e !important;
        }

        /* --- MAIN SECTION --- */
        .main-section {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        /* --- STABILIZED EXTRA COMPACT TITLE BAR --- */
        .title-bar {
            width: 100%;
            height: 56px;
            max-height: 56px;
            min-height: 56px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 24px rgba(30, 41, 59, 0.02);
            gap: 20px;
            box-sizing: border-box;
        }

        .left-section {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        /* MINI GESTURE BUTTON */
        .menu-btn {
            width: 36px;
            height: 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3.5px;
            cursor: pointer;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .menu-btn span {
            width: 18px;
            height: 2px;
            background: #4f46e5;
            border-radius: 10px;
            transition: all 0.25s ease;
        }

        .menu-btn:hover {
            background: #4f46e5;
            border-color: transparent;
        }

        .menu-btn:hover span {
            background: white;
        }

        .menu-btn:hover span:nth-child(1) { width: 12px; transform: translateX(-3px); }
        .menu-btn:hover span:nth-child(3) { width: 9px; transform: translateX(-4.5px); }

        /* --- STABILIZED SEARCH BOX --- */
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex: 1;
            height: 100%;
        }

        .search {
            width: 100%;
            max-width: 340px;
            height: 38px;
            padding: 0 44px 0 18px; 
            border-radius: 50px;
            border: 2px solid #e2e8f0;
            font-size: 13.5px;
            font-weight: 500;
            background: #ffffff;
            color: #1e293b;
            transition: all 0.3s ease;
        }

        .search::placeholder {
            color: #94a3b8;
        }

        .search:focus {
            outline: none;
            border-color: #6366f1;
            max-width: 380px;
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.08);
        }

        .mic {
            position: absolute;
            right: 4px;
            width: 30px;
            height: 30px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 2;
        }

        .search:focus ~ .mic {
            background: #6366f1;
            color: white;
        }

        /* --- CONTENT CARD --- */
        .content-box {
            flex: 1;
            border-radius: 20px;
            background: white;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 16px 40px rgba(30, 41, 59, 0.04);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo">Refynd</div>
        <ul class="menu">
            <li><i class="fa-solid fa-chart-pie"></i> Dashboard</li>
            <li><i class="fa-solid fa-file-circle-plus"></i> Report Lost</li>
            <li><i class="fa-solid fa-file-circle-check"></i> Report Found</li>

            <li class="dropdown">
                <div class="dropdown-title">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Features
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                <div class="dropdown-buttons">
                    <button class="feature-btn match">
                        <i class="fa-solid fa-clone"></i> Match (Both)
                    </button>
                    <button class="feature-btn message">
                        <i class="fa-solid fa-comments"></i> Messaging
                    </button>
                    <button class="feature-btn claims">
                        <i class="fa-solid fa-hand-holding-dollar"></i> Claims
                    </button>
                </div>
            </li>

            <li><i class="fa-solid fa-user-gear"></i> User</li>
            <li><i class="fa-solid fa-id-card"></i> Profile</li>
            <li class="logout-item"><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
        </ul>
    </div>

    <div class="main-section">

        <div class="title-bar">
            <div class="left-section">
                <div class="menu-btn" onclick="toggleSidebar()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <div class="search-box">
                <input type="text" class="search" placeholder="Search parameters, claims...">
                <i class="fa-solid fa-microphone mic"></i>
            </div>
        </div>

        <div class="content-box"></div>
    </div>

    <script>
        function toggleSidebar() {
            document.querySelector(".sidebar").classList.toggle("hide");
        }
    </script>
</body>
</html>
